<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #eaeaea;
            width: 100%;
            box-sizing: border-box;
        }

        .header-icon {
            font-size: 24px;
            color: #0d6efd;
            margin-right: 15px;
            display: flex;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: #4a5568;
        }

        /* SVG icon styling for the building */
        .building-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Login Container Area */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 30px 40px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 500;
            color: #1a202c;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .form-group label {
            font-size: 13px;
            color: #718096;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            color: #2d3748;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .form-control:focus {
            border-color: #3b82f6;
            background-color: #ebf8ff;
        }
        
        /* Auto-fill aesthetic matching the image's hagrid input */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #e6f2ff inset !important;
        }

        .btn-submit {
            width: 100%;
            background-color: #0d6efd;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #0b5ed7;
        }
        
        /* Flash messages block styling */
        .flashes {
            list-style-type: none;
            padding: 0;
            margin: 0 0 20px 0;
            width: 100%;
            text-align: center;
        }
        
        .flashes li {
            color: #c53030;
            background-color: #fff5f5;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-icon">
            <svg class="building-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 6v16h16V6l-8-4zM6 10h2v2H6v-2zm0 4h2v2H6v-2zm6 6h-2v-4h2v4zm-2-6h2v2h-2v-2zm4-4h2v2h-2v-2zm0 4h2v2h-2v-2z" fill="#0d6efd"/>
            </svg>
        </div>
        <h1>Resource Management</h1>
    </div>

    <div class="main-content">
        <div class="login-card">
            <h2>Admin Login</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <ul class="flashes">
                {% for message in messages %}
                  <li>{{ message }}</li>
                {% endfor %}
                </ul>
              {% endif %}
            {% endwith %}

            <!-- Using POST with action pointing to itself or the admin login route -->
            <form action="" method="POST" style="width: 100%;">
                <div class="form-group">
                    <label for="admin_name">Admin Name</label>
                    <input type="text" id="admin_name" name="admin_name" class="form-control" placeholder="admin" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">Login</button>
            </form>
        </div>
    </div>

</body>
</html>
