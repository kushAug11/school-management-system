<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Attendance</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333333;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            border-bottom: 1px solid #eaeaea;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .header-icon {
            font-size: 24px;
            color: #3b82f6;
            margin-right: 15px;
            display: flex;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 500;
        }

        .building-icon {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: #3b82f6;
            transition: color 0.2s;
        }

        .nav-btn {
            background-color: #0d6efd;
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-btn.logout {
            background-color: #dc3545;
            margin-left: 10px;
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 40px;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #4a5568;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #d0f4f4;
            color: #1a202c;
            font-size: 13px;
            font-weight: 700;
            padding: 12px 15px;
        }

        /* Set Details column centered */
        th:last-child {
            text-align: center;
        }

        td {
            padding: 14px 15px;
            font-size: 13px;
            color: #4a5568;
            vertical-align: middle;
            border-bottom: 1px solid #edf2f7;
        }

        td:last-child {
            text-align: center;
        }
        
        /* Alternating rows */
        tbody tr:nth-child(even) {
            background-color: #f7fafc;
        }

        /* Expand/Details Button */
        .btn-expand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background-color: #38a169; /* Green */
            color: white;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-expand:hover {
            opacity: 0.85;
        }
        
        .arrow-icon {
            fill: currentColor;
            width: 16px;
            height: 16px;
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="header-icon">
                <svg class="building-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4 6v16h16V6l-8-4zM6 10h2v2H6v-2zm0 4h2v2H6v-2zm6 6h-2v-4h2v4zm-2-6h2v2h-2v-2zm4-4h2v2h-2v-2zm0 4h2v2h-2v-2z" fill="#0d6efd"/>
                </svg>
            </div>
            <h1>Attendance Management</h1>
        </div>
        
        <div class="header-nav">
            <a href="#" class="nav-link">Start Attendance</a>
            <a href="#" class="nav-btn">View Attendance</a>
            <a href="#" class="nav-btn logout">Logout</a>
        </div>
    </div>

                    <th>Details</th>
                </tr>
            </thead>
            <tbody>

                                <path d="M5 5v14h14V5H5zm2 2h10v10H7V7zm6 2v2h-2v2h2v2h2v-6h-2z"/> 
                            </svg>
                        </a>
                    </td>
                </tr>
                {% endfor %}
                -->

                <!-- Hardcoded fallback rows matching the image exactly -->
                <tr>

                            </svg>

                            </svg>
                        </a>
                    </td>

                <tr>

                            <svg class="arrow-icon" viewBox="0 0 24 24">

                    </td>
                </tr>

                <tr>
                    <td>4</td>
                    <td>John Lark</td>
                    <td>2023-10-03</td>
                    <td>
                        <a href="#" class="btn-expand">

                            </svg>

                    </td>
                </tr>
                
                <tr>
                    <td>5</td>
                    <td>James Potter</td>
                    <td>2023-10-03</td>
                    <td>
                        <a href="#" class="btn-expand">
                            <svg class="arrow-icon" viewBox="0 0 24 24">
                                <path d="M9 15L15 9m0 0H9m6 0v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>
                    </td>

            </tbody>
        </table>
    </div>

</body>
</html>
